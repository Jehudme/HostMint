name: HostMint CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install JHipster CLI
        run: npm install -g generator-jhipster@9.0.0

      - name: Cache Jib layers
        uses: actions/cache@v4
        with:
          path: ~/.cache/google-cloud-tools-java/jib
          key: ${{ runner.os }}-jib-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-jib-

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Regenerate from JDL (regen gate)
        run: |
          jhipster jdl hostmin.jdl --force
          DRIFT="$(git status --porcelain)"
          echo "$DRIFT"

          if [ -n "$DRIFT" ]; then
            ALLOWED_DRIFT_PATTERN='^ M src/test/java/com/hostmint/app/security/SecurityUtilsUnitTest.java$'
            UNEXPECTED_DRIFT="$(printf "%s\n" "$DRIFT" | grep -Ev "$ALLOWED_DRIFT_PATTERN|^$" || true)"

            if [ -n "$UNEXPECTED_DRIFT" ]; then
              echo "::error::Regeneration drift detected after 'jhipster jdl hostmin.jdl --force'."
              echo "::error::Unexpected changed files:"
              printf "%s\n" "$UNEXPECTED_DRIFT"
              echo "::error::Move customizations into non-generated extension files/classes."
              exit 1
            fi

            echo "Only known deterministic regen drift was detected; continuing."
          fi

      - name: Build and Push to GHCR
        env:
          CYPRESS_INSTALL_BINARY: 0
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/hostmint
          IMAGE_ID=$(echo $IMAGE_ID | tr '[:upper:]' '[:lower:]')
          
          echo "Targeting Registry: $IMAGE_ID"
          
          # Added -ntp (no transfer progress) to clean up logs
          # Added -T 1C to use one thread per core for faster compilation
          ./mvnw package -Pprod jib:build -ntp -T 1C \
            -Djib.to.image=$IMAGE_ID \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}
